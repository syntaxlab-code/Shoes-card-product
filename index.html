<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card</title>
    <!--CSS LINK-->
    <link rel="stylesheet" href="style.css">
</head>

<body>
   <!--PRODUCT CARD-->
  <main class="product-card">
    <div class="product-image">
        <img src="shoes.jpeg" alt="shoes">
    </div>
    <div class="prodcut-info">
        <p class="category">Shoes</p>
        <h1>Modern Running Shoes</h1>
        <p class="description">Confortable and stylish shoes designed shoes for everyday running and sport</p>
    </div>
    <div class="price">
        <span>$89.99</span>
        <del>$120</del>
    </div>
    <button>Add To Cart</button>
  </main>

</body>
</html>
